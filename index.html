      /* modal-root debe estar por encima de todo y no tener overflow */
      #modal-root {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 999999;
      }
      #modal-root > * {
        pointer-events: auto;
      }
